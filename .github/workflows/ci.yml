# .github/workflows/ci.yml
name: EmpresaX — CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install pandas numpy scipy scikit-learn pytest

      - name: Rodar testes do Pipeline ETL e do Modelo
        run: pytest "PROJETO INTEGRADO- AGRO/test_etl.py" "PROJETO INTEGRADO- AGRO/test_modelo.py" -v

      - name: Pipeline validado
        run: echo 'Todos os testes passaram — código aprovado para deploy'