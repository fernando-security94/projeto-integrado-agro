<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial scale=1.0">
    
    <title>My second web page</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: beige;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            text-align: center;
            padding: 40px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);

        }

        h1 {
            color: #3498db;
            font-size: 2em;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 1.2em;
        }

        button {
            background-color: #3498db;
            color: #fff;
            font-size: 1.2em;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, world!</h1>
        <p>This is my second web page created with HTML on 
        Vscode! Welcome to web development!
        </p>

        <button onclick="alert('You clicked😎!')">Click here</button>
    </div>

</body>

</html>
